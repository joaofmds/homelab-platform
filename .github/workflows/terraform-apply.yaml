name: Terraform Apply

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: [self-hosted, homelab]

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init (homelab)
        run: terraform -chdir=envs/homelab init -input=false

      - name: Terraform apply (homelab)
        run: terraform -chdir=envs/homelab apply -auto-approve -input=false -no-color
        env:
          TF_VAR_proxmox_endpoint: ${{ secrets.PROXMOX_ENDPOINT }}
          TF_VAR_proxmox_api_token: ${{ secrets.PROXMOX_API_TOKEN }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

      - name: Terraform init (runners)
        run: terraform -chdir=envs/runners init -input=false

      - name: Terraform apply (runners)
        run: terraform -chdir=envs/runners apply -auto-approve -input=false -no-color
        env:
          TF_VAR_proxmox_endpoint: ${{ secrets.PROXMOX_ENDPOINT }}
          TF_VAR_proxmox_api_token: ${{ secrets.PROXMOX_API_TOKEN }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
