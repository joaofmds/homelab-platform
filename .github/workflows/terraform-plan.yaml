name: Terraform Plan

on:
  pull_request:
    paths:
      - "terraform/**"

jobs:
  plan:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform -chdir=envs/homelab init -input=false

      - name: Terraform validate
        run: terraform -chdir=envs/homelab validate

      - name: Terraform plan
        run: terraform -chdir=envs/homelab plan -input=false -no-color
        env:
          TF_VAR_proxmox_endpoint: ${{ secrets.PROXMOX_ENDPOINT }}
          TF_VAR_proxmox_api_token: ${{ secrets.PROXMOX_API_TOKEN }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
