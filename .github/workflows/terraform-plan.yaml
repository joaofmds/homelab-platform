name: Terraform Plan

# Jobs correm apenas em runners self-hosted com label homelab (ver Ansible inventory).
on:
  pull_request:
    paths:
      - "terraform/**"
      - "ansible/**"

jobs:
  plan:
    runs-on:
      - self-hosted
      - homelab

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init (homelab)
        run: terraform -chdir=envs/homelab init -input=false

      - name: Terraform validate (homelab)
        run: terraform -chdir=envs/homelab validate

      - name: Terraform plan (homelab)
        run: terraform -chdir=envs/homelab plan -input=false -no-color
        env:
          TF_VAR_proxmox_endpoint: ${{ secrets.PROXMOX_ENDPOINT }}
          TF_VAR_proxmox_api_token: ${{ secrets.PROXMOX_API_TOKEN }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

      - name: Terraform init (runners)
        run: terraform -chdir=envs/runners init -input=false

      - name: Terraform validate (runners)
        run: terraform -chdir=envs/runners validate

      - name: Terraform plan (runners)
        run: terraform -chdir=envs/runners plan -input=false -no-color
        env:
          TF_VAR_proxmox_pve1_endpoint: ${{ secrets.PROXMOX_PVE1_ENDPOINT }}
          TF_VAR_proxmox_pve1_api_token: ${{ secrets.PROXMOX_PVE1_API_TOKEN }}
          TF_VAR_proxmox_pve2_endpoint: ${{ secrets.PROXMOX_PVE2_ENDPOINT }}
          TF_VAR_proxmox_pve2_api_token: ${{ secrets.PROXMOX_PVE2_API_TOKEN }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
