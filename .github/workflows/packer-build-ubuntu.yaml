# Self-hosted: cada job exige self-hosted + homelab + label do nó (pve1-runner / pve2-runner).
#
# Secrets (repositório): alinhar com Terraform runners onde possível.
#   PROXMOX_PVE1_ENDPOINT, PROXMOX_PVE1_API_TOKEN  (token completo user@realm!id=secret)
#   PROXMOX_PVE2_ENDPOINT, PROXMOX_PVE2_API_TOKEN
#   PACKER_SSH_PASSWORD (único; o hash para user-data é gerado no job com openssl passwd -6)
#
# workflow_dispatch: "replace_existing_template" (default true) remove a VM com o template_id
# nesse nó antes do build, para poder voltar a criar o mesmo VMID (ex.: 9000).
#
name: Build Ubuntu Proxmox Template

on:
  workflow_dispatch:
    inputs:
      replace_existing_template:
        description: "Apagar VM com template_id neste nó antes do Packer (necessário para rebuild do mesmo VMID)"
        type: boolean
        default: true

jobs:
  packer-build:
    name: "Packer (${{ matrix.proxmox_node }})"
    strategy:
      fail-fast: false
      matrix:
        include:
          - proxmox_node: pve1
            runner_label: pve1-runner
            template_id: 9000
          - proxmox_node: pve2
            runner_label: pve2-runner
            template_id: 9000
    runs-on:
      - self-hosted
      - homelab
      - ${{ matrix.runner_label }}

    defaults:
      run:
        working-directory: packer/ubuntu-2404

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Proxmox API for this host
        run: |
          set -euo pipefail
          case "${{ matrix.proxmox_node }}" in
            pve1)
              echo "PROXMOX_API_URL=${{ secrets.PROXMOX_PVE1_ENDPOINT }}" >> "$GITHUB_ENV"
              TOKEN="${{ secrets.PROXMOX_PVE1_API_TOKEN }}"
              ;;
            pve2)
              echo "PROXMOX_API_URL=${{ secrets.PROXMOX_PVE2_ENDPOINT }}" >> "$GITHUB_ENV"
              TOKEN="${{ secrets.PROXMOX_PVE2_API_TOKEN }}"
              ;;
            *)
              echo "Unknown matrix.proxmox_node"
              exit 1
              ;;
          esac
          echo "PROXMOX_NODE=${{ matrix.proxmox_node }}" >> "$GITHUB_ENV"
          echo "PROXMOX_API_TOKEN_ID=${TOKEN%=*}" >> "$GITHUB_ENV"
          echo "PROXMOX_API_TOKEN_SECRET=${TOKEN#*=}" >> "$GITHUB_ENV"
          echo "TEMPLATE_VMID=${{ matrix.template_id }}" >> "$GITHUB_ENV"

      - name: Remove existing Packer VM if opted in
        if: ${{ inputs.replace_existing_template }}
        run: |
          set -euo pipefail
          AUTH_HEADER="Authorization: PVEAPIToken=${PROXMOX_API_TOKEN_ID}=${PROXMOX_API_TOKEN_SECRET}"
          code=$(curl -skS -o /dev/null -w "%{http_code}" -H "$AUTH_HEADER" \
            "${PROXMOX_API_URL}/nodes/${PROXMOX_NODE}/qemu/${TEMPLATE_VMID}/config")
          if [ "$code" != "200" ]; then
            echo "VM ${TEMPLATE_VMID} not found on ${PROXMOX_NODE} (HTTP ${code}); nothing to remove."
            exit 0
          fi
          echo "Stopping VM ${TEMPLATE_VMID}..."
          curl -skS -H "$AUTH_HEADER" -X POST \
            "${PROXMOX_API_URL}/nodes/${PROXMOX_NODE}/qemu/${TEMPLATE_VMID}/status/stop" \
            --data "timeout=120" || true
          sleep 20
          echo "Deleting VM ${TEMPLATE_VMID}..."
          del=$(curl -skS -o /tmp/pve_del.json -w "%{http_code}" -H "$AUTH_HEADER" -X DELETE \
            "${PROXMOX_API_URL}/nodes/${PROXMOX_NODE}/qemu/${TEMPLATE_VMID}")
          if [ "$del" != "200" ]; then
            echo "DELETE failed HTTP ${del}"; cat /tmp/pve_del.json; exit 1
          fi
          echo "Removed VM ${TEMPLATE_VMID}."

      - name: Install Packer
        uses: hashicorp/setup-packer@main

      - name: Inject password hash into autoinstall user-data
        run: |
          set -euo pipefail
          HASH=$(printf '%s' "${PACKER_SSH_PASSWORD}" | openssl passwd -6 -stdin)
          export HASH
          python3 - <<'PY'
          import os
          import pathlib

          h = os.environ["HASH"]
          p = pathlib.Path("http/user-data")
          p.write_text(p.read_text().replace("__SSH_PASSWORD_HASH__", h))
          PY
        env:
          PACKER_SSH_PASSWORD: ${{ secrets.PACKER_SSH_PASSWORD }}

      - name: Packer init
        run: packer init .

      - name: Packer fmt
        run: packer fmt -check .

      - name: Packer validate
        run: |
          packer validate \
            -var "proxmox_api_url=${PROXMOX_API_URL}" \
            -var "proxmox_api_token_id=${PROXMOX_API_TOKEN_ID}" \
            -var "proxmox_api_token_secret=${PROXMOX_API_TOKEN_SECRET}" \
            -var "proxmox_node=${PROXMOX_NODE}" \
            -var "template_id=${{ matrix.template_id }}" \
            -var "ssh_username=packer" \
            -var "ssh_password=${PACKER_SSH_PASSWORD}" \
            .
        env:
          PACKER_SSH_PASSWORD: ${{ secrets.PACKER_SSH_PASSWORD }}

      - name: Packer build
        run: |
          packer build \
            -var "proxmox_api_url=${PROXMOX_API_URL}" \
            -var "proxmox_api_token_id=${PROXMOX_API_TOKEN_ID}" \
            -var "proxmox_api_token_secret=${PROXMOX_API_TOKEN_SECRET}" \
            -var "proxmox_node=${PROXMOX_NODE}" \
            -var "template_id=${{ matrix.template_id }}" \
            -var "template_name=ubuntu-2404-k8s-template" \
            -var "ssh_username=packer" \
            -var "ssh_password=${PACKER_SSH_PASSWORD}" \
            .
        env:
          PACKER_SSH_PASSWORD: ${{ secrets.PACKER_SSH_PASSWORD }}
