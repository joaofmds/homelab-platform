---
- name: Import prerequisite tasks
  ansible.builtin.import_tasks: prereqs.yml

- name: Import containerd tasks
  ansible.builtin.import_tasks: containerd.yml

- name: Apply containerd restarts before installing kubelet
  ansible.builtin.meta: flush_handlers

- name: Import Kubernetes package repository and binaries
  ansible.builtin.import_tasks: kubernetes_packages.yml

- name: Import control plane init
  ansible.builtin.import_tasks: control_plane.yml

- name: Import CNI install
  ansible.builtin.import_tasks: cni.yml

- name: Import worker join
  ansible.builtin.import_tasks: workers_join.yml
