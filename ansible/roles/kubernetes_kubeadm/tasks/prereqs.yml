---
- name: Disable swap immediately
  ansible.builtin.command: swapoff -a
  changed_when: false
  failed_when: false

- name: Remove swap entries from fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\sswap\s+swap\s)'
    replace: '# \1'
    backup: true

- name: Ensure kernel modules for Kubernetes
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      bridge
      br_netfilter
    mode: "0644"

- name: Load overlay module
  ansible.builtin.command: modprobe overlay
  changed_when: true
  failed_when: false

- name: Load bridge module (needed for bridge-nf sysctl on some kernels)
  ansible.builtin.command: modprobe bridge
  changed_when: true
  failed_when: false

- name: Load br_netfilter module
  ansible.builtin.command: modprobe br_netfilter
  changed_when: true
  failed_when: false

- name: Sysctl file for Kubernetes networking
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-kubernetes-cri.conf
    mode: "0644"
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1

- name: Apply sysctl settings
  ansible.builtin.command: sysctl --system
  changed_when: true

- name: Install base packages
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - software-properties-common
    state: present
    update_cache: true
