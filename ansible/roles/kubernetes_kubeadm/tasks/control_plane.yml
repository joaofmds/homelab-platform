---
- name: Check if control plane is already initialized
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: k8s_admin_conf

- name: Kubeadm init (primary control plane only)
  when:
    - "'k8s_control_plane' in group_names"
    - inventory_hostname == (groups['k8s_control_plane'] | sort | first)
    - not k8s_admin_conf.stat.exists
  ansible.builtin.command:
    argv:
      - kubeadm
      - init
      - --pod-network-cidr={{ k8s_pod_network_cidr }}
      - --apiserver-advertise-address={{ k8s_apiserver_advertise_address | default(ansible_host) }}
  register: k8s_kubeadm_init
  changed_when: true

- name: Wait for Kubernetes API on localhost (primary control plane)
  when:
    - "'k8s_control_plane' in group_names"
    - inventory_hostname == (groups['k8s_control_plane'] | sort | first)
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 6443
    delay: 5
    timeout: 300
