---
# ansible_host tem de ser o IPv4 REAL da VM (consola: ip a). Se o ping do teu PC
# falhar, corrige aqui (e opcionalmente locals.tf + terraform apply para alinhar).
all:
  children:
    runners:
      hosts:
        gha-runner-pve1:
          ansible_host: 192.168.1.19
          github_actions_runner_labels: "homelab,pve1-runner"
          github_actions_runner_name: gha-runner-pve1
        gha-runner-pve2:
          ansible_host: 192.168.1.18
          github_actions_runner_labels: "homelab,pve2-runner"
          github_actions_runner_name: gha-runner-pve2
